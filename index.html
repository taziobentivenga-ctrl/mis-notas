<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mis Notas">
<meta name="theme-color" content="#1c1c1e">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<title>Mis Notas</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;}
:root{
  --accent:#2979FF;--accent-light:#E8F0FE;
  --bg:#ffffff;--bg2:#f5f5f7;--bg3:#e8e8ed;
  --text:#1c1c1e;--text2:#6e6e73;--text3:#aeaeb2;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);
  --radius:10px;--radius-lg:14px;
  --sidebar:230px;--header:50px;--toolbar:54px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;
    --text:#f2f2f7;--text2:#aeaeb2;--text3:#636366;
    --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.16);
    --accent-light:#1a2a4a;
  }
}
html,body{height:100%;overflow:hidden;
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',sans-serif;
  font-size:15px;color:var(--text);background:var(--bg);
  position:fixed;width:100%;
  overscroll-behavior:none;
}
.app{display:flex;height:100vh;height:100dvh;}

/* SIDEBAR */
.sidebar{position:fixed;top:0;left:0;height:100%;z-index:50;width:var(--sidebar);
  background:var(--bg);border-right:0.5px solid var(--border2);
  display:flex;flex-direction:column;transform:translateX(-100%);
  transition:transform 0.22s ease;box-shadow:6px 0 28px rgba(0,0,0,0.15);}
.sidebar.open{transform:translateX(0);}
.sidebar-header{height:var(--header);padding:0 16px;padding-top:var(--safe-top);
  display:flex;align-items:center;gap:10px;border-bottom:0.5px solid var(--border);}
.sidebar-logo{font-size:17px;font-weight:700;flex:1;letter-spacing:-0.3px;}
.sidebar-scroll{flex:1;overflow-y:auto;padding:8px 0;}
.sidebar-section{font-size:11px;font-weight:600;color:var(--text3);
  padding:12px 16px 4px;letter-spacing:0.5px;text-transform:uppercase;}
.folder-row{display:flex;align-items:center;gap:9px;padding:9px 14px;margin:1px 8px;
  border-radius:var(--radius);cursor:pointer;color:var(--text2);font-size:14px;transition:background 0.12s;}
.folder-row:hover{background:var(--bg2);}
.folder-row.active{background:var(--accent-light);color:var(--accent);font-weight:500;}
.folder-row i{font-size:18px;flex-shrink:0;}
.folder-row .fname{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.folder-row .fmeta{font-size:11px;color:var(--text3);}
.fdel{display:none;width:20px;height:20px;align-items:center;justify-content:center;
  border:none;background:transparent;color:var(--text3);cursor:pointer;border-radius:4px;font-size:13px;}
.folder-row:hover .fdel{display:flex;}
.subfolder-row{padding-left:34px;}
.sidebar-footer{padding:10px 10px calc(10px + var(--safe-bottom));border-top:0.5px solid var(--border);}
.btn-new{width:100%;padding:8px;border:0.5px solid var(--border2);background:transparent;
  border-radius:var(--radius);cursor:pointer;color:var(--text2);font-size:13px;
  display:flex;align-items:center;justify-content:center;gap:6px;transition:background 0.12s;}
.btn-new:hover{background:var(--bg2);color:var(--text);}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:49;}
.overlay.show{display:block;}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--bg);width:100%;}
.main-header{height:var(--header);padding:0 16px;padding-top:var(--safe-top);
  display:flex;align-items:center;gap:10px;border-bottom:0.5px solid var(--border);background:var(--bg);}
.main-header .path{flex:1;font-size:14px;color:var(--text2);}
.main-header .path strong{color:var(--text);font-weight:600;}
.content{flex:1;overflow:auto;}
.ibtn{width:34px;height:34px;border:none;background:transparent;cursor:pointer;
  color:var(--text2);border-radius:var(--radius);display:flex;align-items:center;justify-content:center;
  font-size:19px;transition:background 0.12s;flex-shrink:0;}
.ibtn:hover{background:var(--bg2);color:var(--text);}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:16px;padding:20px;}
.nb-card{background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--radius-lg);
  cursor:pointer;overflow:hidden;transition:border-color 0.15s,transform 0.1s;position:relative;}
.nb-card:active{transform:scale(0.97);}
.nb-card:hover{border-color:var(--accent);}
.nb-thumb{height:115px;position:relative;display:flex;align-items:center;justify-content:center;background:#fafafa;}
@media(prefers-color-scheme:dark){.nb-thumb{background:#2a2a2c;}}
.nb-thumb i{position:relative;font-size:34px;z-index:1;}
.nb-info{padding:10px 12px 12px;border-top:0.5px solid var(--border);}
.nb-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.nb-sub{font-size:11px;color:var(--text3);margin-top:3px;}
.nb-del{position:absolute;top:6px;right:6px;display:none;}
.nb-card:hover .nb-del{display:flex;}
.nb-color-bar{height:4px;}
.add-card{background:transparent;border:0.5px dashed var(--border2);border-radius:var(--radius-lg);
  cursor:pointer;min-height:175px;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:8px;color:var(--text3);font-size:13px;transition:background 0.12s,color 0.12s;}
.add-card:hover{background:var(--bg2);color:var(--text);}

/* EDITOR */
.editor{display:flex;flex-direction:column;height:100%;}
.toolbar{height:var(--toolbar);background:#1c1c1e;border-bottom:0.5px solid rgba(255,255,255,0.08);
  padding:0 12px;display:flex;align-items:center;gap:4px;overflow-x:auto;overflow-y:hidden;
  scrollbar-width:none;flex-shrink:0;}
.toolbar::-webkit-scrollbar{display:none;}
.tsep{width:0.5px;height:24px;background:rgba(255,255,255,0.12);margin:0 4px;flex-shrink:0;}
.tbtn{width:38px;height:38px;border:none;background:transparent;cursor:pointer;
  color:rgba(255,255,255,0.6);border-radius:var(--radius);display:flex;align-items:center;
  justify-content:center;font-size:20px;transition:background 0.12s,color 0.12s;flex-shrink:0;}
.tbtn:hover{background:rgba(255,255,255,0.1);color:white;}
.tbtn.on{background:var(--accent);color:white;}
.swatch{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;
  transition:border-color 0.12s,transform 0.1s;flex-shrink:0;}
.swatch:active{transform:scale(0.9);}
.swatch.sel{border-color:white;}
.sz-label{font-size:12px;color:rgba(255,255,255,0.5);min-width:22px;text-align:center;}
.back-btn{padding:5px 12px;border:0.5px solid rgba(255,255,255,0.2);background:transparent;
  border-radius:var(--radius);cursor:pointer;color:rgba(255,255,255,0.7);font-size:13px;
  display:flex;align-items:center;gap:5px;transition:background 0.12s;flex-shrink:0;}
.back-btn:hover{background:rgba(255,255,255,0.1);color:white;}
.page-nav{margin-left:auto;display:flex;align-items:center;gap:5px;font-size:13px;
  color:rgba(255,255,255,0.6);white-space:nowrap;}
.page-nav button{border:0.5px solid rgba(255,255,255,0.2);background:transparent;border-radius:6px;
  padding:3px 8px;cursor:pointer;color:rgba(255,255,255,0.7);font-size:14px;}
.page-nav button:hover{background:rgba(255,255,255,0.1);}

/* Canvas viewport: contiene el plano que se mueve/escala */
.canvas-viewport{
  flex:1;position:relative;overflow:hidden;
  background:#1a1a1e;
  touch-action:none;          /* nosotros manejamos todo el touch */
}
.canvas-plane{
  position:absolute;top:0;left:0;
  transform-origin:0 0;
  will-change:transform;
}
.page-container{
  position:relative;
  box-shadow:0 4px 32px rgba(0,0,0,0.5);
  background:#fff;
  border-radius:2px;
}
#bgCanvas{position:absolute;top:0;left:0;pointer-events:none;border-radius:2px;}
#drawCanvas{display:block;border-radius:2px;}

.export-bar{height:44px;background:#1c1c1e;border-top:0.5px solid rgba(255,255,255,0.08);
  padding:0 14px;padding-bottom:var(--safe-bottom);display:flex;align-items:center;gap:8px;flex-shrink:0;}
.ebtn{padding:6px 14px;border:0.5px solid rgba(255,255,255,0.2);background:transparent;
  border-radius:var(--radius);cursor:pointer;font-size:13px;color:rgba(255,255,255,0.7);
  display:flex;align-items:center;gap:6px;transition:background 0.12s;}
.ebtn:hover{background:rgba(255,255,255,0.1);color:white;}
.ebtn.primary{background:var(--accent);color:white;border-color:var(--accent);}
.zoom-info{margin-left:auto;font-size:12px;color:rgba(255,255,255,0.4);display:flex;align-items:center;gap:8px;}
.zoom-info button{border:0.5px solid rgba(255,255,255,0.2);background:transparent;color:rgba(255,255,255,0.6);
  border-radius:6px;padding:3px 8px;cursor:pointer;font-size:12px;}

/* MODALS */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;align-items:center;justify-content:center;padding:20px;}
.modal-bg.open{display:flex;}
.modal{background:var(--bg);border-radius:var(--radius-lg);border:0.5px solid var(--border2);padding:22px 24px;width:100%;max-width:340px;}
.modal h3{font-size:16px;font-weight:600;margin-bottom:16px;}
.modal input,.modal select{width:100%;padding:9px 11px;border:0.5px solid var(--border2);border-radius:var(--radius);
  background:var(--bg2);color:var(--text);font-size:14px;margin-bottom:12px;outline:none;-webkit-user-select:text;user-select:text;}
.modal input:focus,.modal select:focus{border-color:var(--accent);}
.color-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.c-opt{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color 0.12s;}
.c-opt.sel{border-color:var(--text);}
.ptype-row{display:flex;gap:8px;margin-bottom:16px;}
.ptype{flex:1;padding:9px 4px;border:0.5px solid var(--border2);border-radius:var(--radius);
  cursor:pointer;text-align:center;font-size:12px;color:var(--text2);transition:background 0.12s;}
.ptype.sel{border-color:var(--accent);background:var(--accent-light);color:var(--accent);}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;}
.modal-btns button{padding:8px 18px;border-radius:var(--radius);cursor:pointer;font-size:14px;
  border:0.5px solid var(--border2);background:transparent;color:var(--text2);transition:background 0.12s;}
.modal-btns .ok{background:var(--accent);color:white;border-color:var(--accent);}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;
  gap:14px;color:var(--text3);padding:40px;text-align:center;}
.empty i{font-size:52px;}
.empty p{font-size:15px;line-height:1.5;}
</style>
</head>
<body>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<div class="app">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <i class="ti ti-notebook" style="font-size:20px;color:var(--accent)" aria-hidden="true"></i>
      <span class="sidebar-logo">Mis Notas</span>
      <button class="ibtn" onclick="closeSidebar()"><i class="ti ti-x"></i></button>
    </div>
    <div class="sidebar-scroll" id="folderList"></div>
    <div class="sidebar-footer">
      <button class="btn-new" onclick="openFolderModal(null)"><i class="ti ti-folder-plus"></i> Nueva carpeta</button>
    </div>
  </div>

  <div class="main">
    <div class="main-header" id="mainHeader">
      <button class="ibtn" onclick="toggleSidebar()"><i class="ti ti-layout-sidebar"></i></button>
      <div class="path" id="mainPath"><strong>Mis Notas</strong></div>
    </div>
    <div class="content" id="mainContent"></div>
  </div>
</div>

<div class="modal-bg" id="folderModal">
  <div class="modal">
    <h3>Nueva carpeta</h3>
    <input type="text" id="folderName" placeholder="Nombre de la carpeta">
    <div style="font-size:12px;color:var(--text2);margin-bottom:6px;">Subcarpeta de:</div>
    <select id="parentSel"></select>
    <div class="modal-btns">
      <button onclick="closeFolderModal()">Cancelar</button>
      <button class="ok" onclick="confirmFolder()">Crear</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="nbModal">
  <div class="modal">
    <h3>Nuevo cuaderno</h3>
    <input type="text" id="nbName" placeholder="Nombre del cuaderno">
    <div style="font-size:12px;color:var(--text2);margin-bottom:8px;">Color:</div>
    <div class="color-row" id="nbColors"></div>
    <div style="font-size:12px;color:var(--text2);margin-bottom:8px;">Tipo de página:</div>
    <div class="ptype-row">
      <div class="ptype sel" data-t="grid" onclick="selPtype(this)"><i class="ti ti-grid-dots"></i><br>Cuadriculada</div>
      <div class="ptype" data-t="lines" onclick="selPtype(this)"><i class="ti ti-align-left"></i><br>Rayada</div>
      <div class="ptype" data-t="blank" onclick="selPtype(this)"><i class="ti ti-file"></i><br>En blanco</div>
    </div>
    <div class="modal-btns">
      <button onclick="closeNbModal()">Cancelar</button>
      <button class="ok" onclick="confirmNb()">Crear</button>
    </div>
  </div>
</div>

<script>
const PAL=['#2979FF','#0F6E56','#D84315','#7B1FA2','#1565C0','#E65100','#2E7D32'];

let S=loadState();
let STROKES={},TEXTS={};

function loadState(){
  try{const s=localStorage.getItem('notasapp_v5');if(s)return JSON.parse(s);}catch(e){}
  return{
    folders:[{id:'f1',name:'Documentos',parentId:null,color:'#2979FF'},
             {id:'f2',name:'Favoritos',parentId:null,color:'#E65100'}],
    notebooks:[{id:'nb1',folderId:'f1',name:'Biometría',color:'#2979FF',pageType:'grid',pages:1}],
    selectedFolder:'f1',openNb:null,currentPage:0,view:'grid',
    tool:'pen',penColor:'#1c1c1e',penSize:2,
    newNbColor:PAL[0],newNbType:'grid',
  };
}
function saveState(){try{localStorage.setItem('notasapp_v5',JSON.stringify(S));}catch(e){}}
function saveStrokes(){
  try{localStorage.setItem('notasapp_strokes_v5',JSON.stringify(STROKES));}catch(e){}
  try{localStorage.setItem('notasapp_texts_v5',JSON.stringify(TEXTS));}catch(e){}
}
function loadStrokes(){
  try{STROKES=JSON.parse(localStorage.getItem('notasapp_strokes_v5')||'{}');}catch(e){STROKES={};}
  try{TEXTS=JSON.parse(localStorage.getItem('notasapp_texts_v5')||'{}');}catch(e){TEXTS={};}
}
function uid(){return Math.random().toString(36).slice(2,9);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('overlay').classList.toggle('show');}
function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('overlay').classList.remove('show');}

function render(){renderSidebar();renderMain();saveState();}

function renderSidebar(){
  const el=document.getElementById('folderList');
  const roots=S.folders.filter(f=>!f.parentId);
  let h=`<div class="sidebar-section">Carpetas</div>`;
  for(const f of roots){
    const subs=S.folders.filter(x=>x.parentId===f.id);
    const cnt=S.notebooks.filter(n=>n.folderId===f.id).length;
    h+=folderRowHtml(f,cnt,S.selectedFolder===f.id,false);
    for(const sf of subs){
      const scnt=S.notebooks.filter(n=>n.folderId===sf.id).length;
      h+=folderRowHtml(sf,scnt,S.selectedFolder===sf.id,true);
    }
    h+=`<div style="padding-left:40px;padding-bottom:4px;"><button class="btn-new" style="font-size:11px;padding:4px 8px;" onclick="openFolderModal('${f.id}')"><i class="ti ti-plus"></i> Subcarpeta</button></div>`;
  }
  el.innerHTML=h;
}
function folderRowHtml(f,cnt,act,sub){
  return`<div class="folder-row${act?' active':''}${sub?' subfolder-row':''}" onclick="selFolder('${f.id}')">
    <i class="ti ${act?'ti-folder-open':'ti-folder'}" style="color:${f.color}"></i>
    <span class="fname">${esc(f.name)}</span><span class="fmeta">${cnt}</span>
    <button class="fdel" onclick="delFolder(event,'${f.id}')"><i class="ti ti-x"></i></button></div>`;
}

function renderMain(){if(S.view==='grid')renderGrid();else renderEditor();}

function renderGrid(){
  const folder=S.folders.find(f=>f.id===S.selectedFolder);
  const nbs=S.notebooks.filter(n=>n.folderId===S.selectedFolder);
  const parent=folder?.parentId?S.folders.find(f=>f.id===folder.parentId):null;
  document.getElementById('mainPath').innerHTML=folder
    ?`${parent?`<span>${esc(parent.name)} / </span>`:''}<strong>${esc(folder.name)}</strong>`:'<strong>Mis Notas</strong>';
  if(!folder){document.getElementById('mainContent').innerHTML=`<div class="empty"><i class="ti ti-layout-sidebar-left-expand"></i><p>Tocá el ícono de la izquierda para abrir tus carpetas</p></div>`;return;}
  let h=`<div class="grid">`;
  for(const nb of nbs){
    const pages=nb.pages||1;
    const lbl=nb.pageType==='grid'?'Cuadriculada':nb.pageType==='lines'?'Rayada':'En blanco';
    h+=`<div class="nb-card" onclick="openNb('${nb.id}')">
      <div class="nb-color-bar" style="background:${nb.color}"></div>
      <div class="nb-thumb">${thumbSVG(nb.pageType)}<i class="ti ti-notebook" style="font-size:32px;color:${nb.color};position:relative;z-index:1;"></i>
      <button class="ibtn nb-del" onclick="delNb(event,'${nb.id}')"><i class="ti ti-trash"></i></button></div>
      <div class="nb-info"><div class="nb-name">${esc(nb.name)}</div><div class="nb-sub">${pages} pág · ${lbl}</div></div></div>`;
  }
  h+=`<div class="add-card" onclick="openNbModal()"><i class="ti ti-plus" style="font-size:28px;"></i><span>Nuevo cuaderno</span></div></div>`;
  document.getElementById('mainContent').innerHTML=h;
}
function thumbSVG(type){
  const col='#444';
  if(type==='grid'){
    let l='';
    for(let x=0;x<=150;x+=20)l+=`<line x1="${x}" y1="0" x2="${x}" y2="115" stroke="${col}" stroke-width="0.5" opacity="0.3"/>`;
    for(let y=0;y<=115;y+=20)l+=`<line x1="0" y1="${y}" x2="150" y2="${y}" stroke="${col}" stroke-width="0.5" opacity="0.3"/>`;
    return`<svg style="position:absolute;inset:0;width:100%;height:100%;" viewBox="0 0 150 115">${l}</svg>`;
  }
  if(type==='lines'){
    let l='';
    for(let y=14;y<115;y+=14)l+=`<line x1="10" y1="${y}" x2="140" y2="${y}" stroke="${col}" stroke-width="0.5" opacity="0.3"/>`;
    return`<svg style="position:absolute;inset:0;width:100%;height:100%;" viewBox="0 0 150 115">${l}</svg>`;
  }
  return'';
}

/* ════════════════════════════════════════════
   EDITOR — motor de canvas con zoom/pan/dibujo
   ════════════════════════════════════════════ */
const PAGE_W=1000, PAGE_H=1414;   // resolución interna de la hoja (fija)

let view={scale:1, tx:0, ty:0};   // transform del plano
let drawing=false, curStroke=[], drawCtx=null;
let penSeen=false;                 // ¿se detectó Apple Pencil?
let penMode='auto';                // auto | pen-only | allow-touch

// Estado de gestos táctiles (dedos)
let activeTouches=new Map();
let gestureStart=null;

function renderEditor(){
  const nb=S.notebooks.find(n=>n.id===S.openNb);
  if(!nb){S.view='grid';renderMain();return;}
  const pages=nb.pages||1, cp=Math.min(S.currentPage,pages-1);
  document.getElementById('mainPath').innerHTML=`<strong>${esc(nb.name)}</strong>`;

  const PEN_COLORS=[['#1c1c1e','Negro'],['#2979FF','Azul'],['#D84315','Rojo'],
    ['#0F6E56','Verde'],['#7B1FA2','Violeta'],['#E65100','Naranja'],['#ffffff','Blanco']];
  const swatches=PEN_COLORS.map(([c,l])=>
    `<div class="swatch${S.penColor===c?' sel':''}" style="background:${c};${c==='#ffffff'?'box-shadow:inset 0 0 0 1px rgba(255,255,255,0.4);':''}" onclick="setPenColor('${c}')" title="${l}"></div>`).join('');

  document.getElementById('mainContent').innerHTML=
  `<div class="editor" style="height:calc(100vh - var(--header));height:calc(100dvh - var(--header));">
    <div class="toolbar">
      <button class="back-btn" onclick="closeEditor()"><i class="ti ti-arrow-left"></i> Atrás</button>
      <div class="tsep"></div>
      <button class="tbtn${S.tool==='pen'?' on':''}" onclick="setTool('pen')" title="Lapicera"><i class="ti ti-pencil"></i></button>
      <button class="tbtn${S.tool==='marker'?' on':''}" onclick="setTool('marker')" title="Marcador"><i class="ti ti-highlight"></i></button>
      <button class="tbtn${S.tool==='eraser'?' on':''}" onclick="setTool('eraser')" title="Borrador"><i class="ti ti-eraser"></i></button>
      <button class="tbtn${S.tool==='text'?' on':''}" onclick="setTool('text')" title="Texto"><i class="ti ti-cursor-text"></i></button>
      <div class="tsep"></div>
      ${swatches}
      <div class="tsep"></div>
      <input type="range" min="1" max="16" value="${S.penSize}" oninput="setPenSize(+this.value)" style="width:60px;accent-color:var(--accent);">
      <span class="sz-label">${S.penSize}</span>
      <div class="tsep"></div>
      <button class="tbtn" onclick="undoStroke()" title="Deshacer"><i class="ti ti-arrow-back-up"></i></button>
      <button class="tbtn" onclick="clearPage()" title="Limpiar trazos"><i class="ti ti-trash"></i></button>
      <div class="tsep"></div>
      <button class="tbtn on" id="penModeBtn" onclick="cyclePenMode()" title="Modo de escritura"><i class="ti ti-wand"></i></button>
      <div class="page-nav">
        <button onclick="prevPage()"><i class="ti ti-chevron-left"></i></button>
        <span>${cp+1} / ${pages}</span>
        <button onclick="nextPage()"><i class="ti ti-chevron-right"></i></button>
        <button class="ibtn" style="color:rgba(255,255,255,0.6);" onclick="addPage()" title="Nueva página"><i class="ti ti-file-plus"></i></button>
      </div>
    </div>

    <div class="canvas-viewport" id="viewport">
      <div class="canvas-plane" id="plane">
        <div class="page-container" id="pageContainer" style="width:${PAGE_W}px;height:${PAGE_H}px;">
          <canvas id="bgCanvas" width="${PAGE_W}" height="${PAGE_H}"></canvas>
          <canvas id="drawCanvas" width="${PAGE_W}" height="${PAGE_H}"></canvas>
        </div>
      </div>
    </div>

    <div class="export-bar">
      <button class="ebtn" onclick="exportPNG()"><i class="ti ti-photo"></i> PNG</button>
      <button class="ebtn primary" onclick="exportPDF()"><i class="ti ti-file-type-pdf"></i> PDF</button>
      <div class="zoom-info">
        <span id="penModeLabel">Solo lápiz</span>
        <button onclick="resetZoom()"><i class="ti ti-zoom-reset"></i> <span id="zoomPct">100%</span></button>
      </div>
    </div>
  </div>`;

  setupEditor(nb,cp);
}

function setupEditor(nb,pageIndex){
  const bg=document.getElementById('bgCanvas');
  const draw=document.getElementById('drawCanvas');
  const viewport=document.getElementById('viewport');

  // Fondo (cuadrícula NEGRA) — se dibuja una sola vez, intocable
  const bgCtx=bg.getContext('2d');
  bgCtx.fillStyle='#ffffff';
  bgCtx.fillRect(0,0,PAGE_W,PAGE_H);
  drawBg(bgCtx,nb.pageType);

  // Trazos
  drawCtx=draw.getContext('2d');
  drawCtx.clearRect(0,0,PAGE_W,PAGE_H);
  const key=`${nb.id}_p${pageIndex}`;
  if(STROKES[key])replayStrokes(drawCtx,STROKES[key]);
  if(TEXTS[key])for(const t of TEXTS[key])drawText(drawCtx,t);

  // Ajustar zoom inicial para que la hoja entre en pantalla
  fitToScreen();

  // ── EVENTOS UNIFICADOS ──
  // Usamos pointer events en el VIEWPORT (no en el canvas) para capturar todo
  viewport.addEventListener('pointerdown',onPointerDown,{passive:false});
  viewport.addEventListener('pointermove',onPointerMove,{passive:false});
  viewport.addEventListener('pointerup',onPointerUp,{passive:false});
  viewport.addEventListener('pointercancel',onPointerUp,{passive:false});
  viewport.addEventListener('pointerleave',onPointerUp,{passive:false});
  // Zoom con rueda (trackpad/mouse en PC)
  viewport.addEventListener('wheel',onWheel,{passive:false});

  updatePenModeUI();
}

function fitToScreen(){
  const vp=document.getElementById('viewport');
  if(!vp)return;
  const vw=vp.clientWidth, vh=vp.clientHeight;
  const pad=40;
  const scale=Math.min((vw-pad)/PAGE_W,(vh-pad)/PAGE_H);
  view.scale=scale;
  view.tx=(vw-PAGE_W*scale)/2;
  view.ty=20;
  applyTransform();
}
function resetZoom(){fitToScreen();}

function applyTransform(){
  const plane=document.getElementById('plane');
  if(!plane)return;
  plane.style.transform=`translate(${view.tx}px,${view.ty}px) scale(${view.scale})`;
  const pct=document.getElementById('zoomPct');
  if(pct)pct.textContent=Math.round(view.scale*100)+'%';
}

// Convierte coords de pantalla a coords internas de la hoja
function screenToPage(clientX,clientY){
  const vp=document.getElementById('viewport');
  const r=vp.getBoundingClientRect();
  const x=(clientX-r.left-view.tx)/view.scale;
  const y=(clientY-r.top-view.ty)/view.scale;
  return{x,y};
}

/* ── DECISIÓN: dibujar o gesto ── */
function isDrawingPointer(e){
  if(e.pointerType==='mouse')return true;
  if(e.pointerType==='pen'){penSeen=true;return true;}
  if(e.pointerType==='touch'){
    if(penMode==='allow-touch')return true;
    if(penMode==='pen-only')return false;
    return !penSeen; // auto
  }
  return false;
}

function onPointerDown(e){
  // TEXTO: tap simple
  if(S.tool==='text' && e.pointerType!=='touch'){
    const p=screenToPage(e.clientX,e.clientY);
    addTextAt(p.x,p.y);
    return;
  }

  if(isDrawingPointer(e)){
    // DIBUJAR
    e.preventDefault();
    drawing=true;curStroke=[];
    const p=screenToPage(e.clientX,e.clientY);
    const first={x:p.x,y:p.y,tool:S.tool,color:S.penColor,size:S.penSize};
    curStroke.push(first);
    applyStyle(drawCtx,first);
    drawCtx.beginPath();drawCtx.moveTo(p.x,p.y);
    try{e.target.setPointerCapture(e.pointerId);}catch(_){}
  }else if(e.pointerType==='touch'){
    // GESTO (zoom/pan con dedos)
    activeTouches.set(e.pointerId,{x:e.clientX,y:e.clientY});
    startGesture();
  }
}

function onPointerMove(e){
  if(drawing && isDrawingPointer(e)){
    e.preventDefault();
    const p=screenToPage(e.clientX,e.clientY);
    if(curStroke.length>0){
      const prev=curStroke[curStroke.length-1];
      const mx=(prev.x+p.x)/2, my=(prev.y+p.y)/2;
      drawCtx.quadraticCurveTo(prev.x,prev.y,mx,my);
      drawCtx.stroke();
      drawCtx.beginPath();drawCtx.moveTo(mx,my);
    }
    curStroke.push({x:p.x,y:p.y});
    return;
  }
  // Gesto con dedos
  if(activeTouches.has(e.pointerId)){
    activeTouches.set(e.pointerId,{x:e.clientX,y:e.clientY});
    updateGesture();
  }
}

function onPointerUp(e){
  if(drawing && (e.pointerType==='pen'||e.pointerType==='mouse'||(e.pointerType==='touch'&&!penSeen&&penMode!=='pen-only'))){
    drawing=false;
    if(curStroke.length>=2){
      const nb=S.notebooks.find(n=>n.id===S.openNb);
      const key=`${nb.id}_p${S.currentPage}`;
      if(!STROKES[key])STROKES[key]=[];
      STROKES[key].push([...curStroke]);
      saveStrokes();
    }
    curStroke=[];
  }
  if(activeTouches.has(e.pointerId)){
    activeTouches.delete(e.pointerId);
    if(activeTouches.size<2)gestureStart=null;
    else startGesture();
  }
  updatePenModeUI();
}

/* ── GESTOS: pinch zoom + pan de a dos dedos ── */
function startGesture(){
  if(activeTouches.size<1)return;
  const pts=[...activeTouches.values()];
  if(activeTouches.size>=2){
    const[a,b]=pts;
    gestureStart={
      dist:Math.hypot(b.x-a.x,b.y-a.y),
      cx:(a.x+b.x)/2, cy:(a.y+b.y)/2,
      scale:view.scale, tx:view.tx, ty:view.ty
    };
  }else{
    const a=pts[0];
    gestureStart={single:true, x:a.x, y:a.y, tx:view.tx, ty:view.ty};
  }
}
function updateGesture(){
  if(!gestureStart)return;
  const pts=[...activeTouches.values()];
  if(activeTouches.size>=2 && !gestureStart.single){
    const[a,b]=pts;
    const dist=Math.hypot(b.x-a.x,b.y-a.y);
    const cx=(a.x+b.x)/2, cy=(a.y+b.y)/2;
    const vp=document.getElementById('viewport').getBoundingClientRect();
    const ratio=dist/gestureStart.dist;
    let newScale=Math.max(0.2,Math.min(5,gestureStart.scale*ratio));
    // Zoom centrado en el punto medio de los dedos
    const ox=gestureStart.cx-vp.left, oy=gestureStart.cy-vp.top;
    view.scale=newScale;
    view.tx=ox-(ox-gestureStart.tx)*(newScale/gestureStart.scale)+(cx-gestureStart.cx);
    view.ty=oy-(oy-gestureStart.ty)*(newScale/gestureStart.scale)+(cy-gestureStart.cy);
    applyTransform();
  }else if(activeTouches.size===1 && gestureStart.single){
    // Pan con un dedo
    const a=pts[0];
    view.tx=gestureStart.tx+(a.x-gestureStart.x);
    view.ty=gestureStart.ty+(a.y-gestureStart.y);
    applyTransform();
  }
}

function onWheel(e){
  e.preventDefault();
  const vp=document.getElementById('viewport').getBoundingClientRect();
  const ox=e.clientX-vp.left, oy=e.clientY-vp.top;
  const delta=-e.deltaY*0.0015;
  const newScale=Math.max(0.2,Math.min(5,view.scale*(1+delta)));
  view.tx=ox-(ox-view.tx)*(newScale/view.scale);
  view.ty=oy-(oy-view.ty)*(newScale/view.scale);
  view.scale=newScale;
  applyTransform();
}

/* ── FONDO: cuadrícula NEGRA, 28px ── */
function drawBg(ctx,type){
  ctx.save();
  if(type==='grid'){
    const step=28;
    ctx.strokeStyle='rgba(0,0,0,0.22)';ctx.lineWidth=0.7;
    for(let x=0;x<=PAGE_W;x+=step){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,PAGE_H);ctx.stroke();}
    for(let y=0;y<=PAGE_H;y+=step){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(PAGE_W,y);ctx.stroke();}
  }else if(type==='lines'){
    const step=28;
    ctx.strokeStyle='rgba(0,0,0,0.2)';ctx.lineWidth=0.7;
    for(let y=step;y<PAGE_H;y+=step){ctx.beginPath();ctx.moveTo(70,y);ctx.lineTo(PAGE_W-12,y);ctx.stroke();}
    ctx.strokeStyle='rgba(210,70,70,0.35)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(95,0);ctx.lineTo(95,PAGE_H);ctx.stroke();
  }
  ctx.restore();
}

function replayStrokes(ctx,strokes){
  ctx.clearRect(0,0,PAGE_W,PAGE_H);
  for(const s of strokes){
    if(!s||s.length<2)continue;
    applyStyle(ctx,s[0]);
    ctx.beginPath();ctx.moveTo(s[0].x,s[0].y);
    for(let i=1;i<s.length;i++)ctx.lineTo(s[i].x,s[i].y);
    ctx.stroke();
  }
  ctx.globalCompositeOperation='source-over';
}
function applyStyle(ctx,f){
  if(f.tool==='eraser'){ctx.globalCompositeOperation='destination-out';ctx.strokeStyle='rgba(0,0,0,1)';ctx.lineWidth=f.size*6;}
  else if(f.tool==='marker'){ctx.globalCompositeOperation='source-over';ctx.strokeStyle=f.color+'55';ctx.lineWidth=f.size*4;}
  else{ctx.globalCompositeOperation='source-over';ctx.strokeStyle=f.color;ctx.lineWidth=f.size;}
  ctx.lineCap='round';ctx.lineJoin='round';
}
function drawText(ctx,t){
  ctx.globalCompositeOperation='source-over';
  ctx.font=`${t.size||20}px -apple-system,sans-serif`;
  ctx.fillStyle=t.color;ctx.fillText(t.text,t.x,t.y);
}
function addTextAt(x,y){
  const text=prompt('Escribí el texto:');
  if(!text)return;
  const nb=S.notebooks.find(n=>n.id===S.openNb);
  const key=`${nb.id}_p${S.currentPage}`;
  if(!TEXTS[key])TEXTS[key]=[];
  const t={x,y,text,color:S.penColor,size:S.penSize+18};
  TEXTS[key].push(t);
  drawText(drawCtx,t);saveStrokes();
}

function undoStroke(){
  const nb=S.notebooks.find(n=>n.id===S.openNb);
  const key=`${nb.id}_p${S.currentPage}`;
  if(STROKES[key]?.length){STROKES[key].pop();saveStrokes();redrawDraw(nb,S.currentPage);}
}
function clearPage(){
  if(!confirm('¿Limpiar los trazos? La cuadrícula se mantiene.'))return;
  const nb=S.notebooks.find(n=>n.id===S.openNb);
  const key=`${nb.id}_p${S.currentPage}`;
  STROKES[key]=[];TEXTS[key]=[];saveStrokes();redrawDraw(nb,S.currentPage);
}
function redrawDraw(nb,pageIndex){
  if(!drawCtx)return;
  drawCtx.globalCompositeOperation='source-over';
  drawCtx.clearRect(0,0,PAGE_W,PAGE_H);
  replayStrokes(drawCtx,STROKES[`${nb.id}_p${pageIndex}`]||[]);
  if(TEXTS[`${nb.id}_p${pageIndex}`])for(const t of TEXTS[`${nb.id}_p${pageIndex}`])drawText(drawCtx,t);
}

function setTool(t){S.tool=t;saveState();renderEditor();}
function setPenColor(c){S.penColor=c;saveState();
  document.querySelectorAll('.swatch').forEach(el=>el.classList.remove('sel'));
  event.target.classList.add('sel');
}
function setPenSize(v){S.penSize=v;saveState();const el=document.querySelector('.sz-label');if(el)el.textContent=v;}

function cyclePenMode(){
  if(penMode==='auto')penMode='pen-only';
  else if(penMode==='pen-only')penMode='allow-touch';
  else penMode='auto';
  updatePenModeUI();
}
function updatePenModeUI(){
  const btn=document.getElementById('penModeBtn');
  const lbl=document.getElementById('penModeLabel');
  if(!btn||!lbl)return;
  let txt,icon,on;
  if(penMode==='pen-only'){txt='Solo lápiz (palma OK)';icon='ti-pencil';on=true;}
  else if(penMode==='allow-touch'){txt='Dedo + lápiz';icon='ti-hand-finger';on=false;}
  else{txt=penSeen?'Auto: lápiz activo':'Auto: lápiz o dedo';icon='ti-wand';on=true;}
  lbl.textContent=txt;
  btn.querySelector('i').className='ti '+icon;
  btn.classList.toggle('on',on);
}

function addPage(){const nb=S.notebooks.find(n=>n.id===S.openNb);nb.pages=(nb.pages||1)+1;S.currentPage=nb.pages-1;saveState();renderEditor();}
function prevPage(){if(S.currentPage>0){S.currentPage--;saveState();renderEditor();}}
function nextPage(){const nb=S.notebooks.find(n=>n.id===S.openNb);if(S.currentPage<(nb.pages||1)-1){S.currentPage++;saveState();renderEditor();}}

function getMerged(){
  const bg=document.getElementById('bgCanvas'),draw=document.getElementById('drawCanvas');
  if(!bg||!draw)return null;
  const tmp=document.createElement('canvas');tmp.width=PAGE_W;tmp.height=PAGE_H;
  const ctx=tmp.getContext('2d');ctx.drawImage(bg,0,0);ctx.drawImage(draw,0,0);return tmp;
}
function exportPNG(){const tmp=getMerged();if(!tmp)return;const nb=S.notebooks.find(n=>n.id===S.openNb);
  const a=document.createElement('a');a.download=`${nb.name}-p${S.currentPage+1}.png`;a.href=tmp.toDataURL('image/png');a.click();}
function exportPDF(){
  const tmp=getMerged();if(!tmp){alert('Abrí un cuaderno primero');return;}
  const nb=S.notebooks.find(n=>n.id===S.openNb);
  const scr=document.createElement('script');
  scr.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
  scr.onload=function(){const{jsPDF}=window.jspdf;
    const doc=new jsPDF({orientation:'portrait',unit:'px',format:[PAGE_W,PAGE_H]});
    doc.addImage(tmp.toDataURL('image/png'),'PNG',0,0,PAGE_W,PAGE_H);doc.save(`${nb.name}.pdf`);};
  document.head.appendChild(scr);
}

function openNb(id){S.openNb=id;S.currentPage=0;S.view='editor';S.tool='pen';closeSidebar();saveState();renderMain();}
function closeEditor(){S.view='grid';S.openNb=null;saveState();renderMain();}
function selFolder(id){S.selectedFolder=id;S.view='grid';S.openNb=null;closeSidebar();saveState();render();}
function delFolder(e,id){e.stopPropagation();if(!confirm('¿Eliminar carpeta y sus cuadernos?'))return;
  S.folders=S.folders.filter(f=>f.id!==id&&f.parentId!==id);S.notebooks=S.notebooks.filter(n=>n.folderId!==id);
  if(S.selectedFolder===id)S.selectedFolder=S.folders[0]?.id||null;saveState();render();}
function delNb(e,id){e.stopPropagation();if(!confirm('¿Eliminar cuaderno?'))return;
  S.notebooks=S.notebooks.filter(n=>n.id!==id);saveState();render();}

function openFolderModal(parentId){
  const sel=document.getElementById('parentSel');sel.innerHTML='<option value="">— Raíz —</option>';
  S.folders.filter(f=>!f.parentId).forEach(f=>{const o=document.createElement('option');o.value=f.id;o.textContent=f.name;if(parentId===f.id)o.selected=true;sel.appendChild(o);});
  document.getElementById('folderName').value='';document.getElementById('folderModal').classList.add('open');
  setTimeout(()=>document.getElementById('folderName').focus(),80);
}
function closeFolderModal(){document.getElementById('folderModal').classList.remove('open');}
function confirmFolder(){const name=document.getElementById('folderName').value.trim();if(!name)return;
  const parentId=document.getElementById('parentSel').value||null;
  S.folders.push({id:uid(),name,parentId,color:PAL[S.folders.length%PAL.length]});closeFolderModal();render();}

function openNbModal(){if(!S.selectedFolder){alert('Seleccioná una carpeta primero');return;}
  S.newNbColor=PAL[0];S.newNbType='grid';document.getElementById('nbName').value='';
  document.getElementById('nbColors').innerHTML=PAL.map((c,i)=>`<div class="c-opt${i===0?' sel':''}" style="background:${c}" onclick="selNbColor(this,'${c}')"></div>`).join('');
  document.querySelectorAll('.ptype').forEach(el=>el.classList.toggle('sel',el.dataset.t==='grid'));
  document.getElementById('nbModal').classList.add('open');setTimeout(()=>document.getElementById('nbName').focus(),80);}
function closeNbModal(){document.getElementById('nbModal').classList.remove('open');}
function selNbColor(el,c){S.newNbColor=c;document.querySelectorAll('.c-opt').forEach(e=>e.classList.remove('sel'));el.classList.add('sel');}
function selPtype(el){S.newNbType=el.dataset.t;document.querySelectorAll('.ptype').forEach(e=>e.classList.remove('sel'));el.classList.add('sel');}
function confirmNb(){const name=document.getElementById('nbName').value.trim();if(!name)return;
  S.notebooks.push({id:uid(),folderId:S.selectedFolder,name,color:S.newNbColor,pageType:S.newNbType,pages:1});closeNbModal();saveState();render();}

// Evitar gestos de zoom nativos de Safari que interfieren
document.addEventListener('gesturestart',e=>e.preventDefault());
document.addEventListener('gesturechange',e=>e.preventDefault());
document.addEventListener('gestureend',e=>e.preventDefault());

loadStrokes();
render();
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}
</script>
</body>
</html>
