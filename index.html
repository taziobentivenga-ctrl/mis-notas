<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Mis Notas">
<meta name="theme-color" content="#185FA5">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<title>Mis Notas</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --accent:#185FA5;
  --accent-light:#E6F1FB;
  --bg:#ffffff;
  --bg2:#f5f5f7;
  --bg3:#ebebee;
  --text:#1c1c1e;
  --text2:#6e6e73;
  --text3:#aeaeb2;
  --border:rgba(0,0,0,0.1);
  --border2:rgba(0,0,0,0.18);
  --radius:10px;
  --radius-lg:14px;
  --sidebar:240px;
  --header:52px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;
    --text:#f2f2f7;--text2:#aeaeb2;--text3:#636366;
    --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.2);
    --accent-light:#0c2d4a;
  }
}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;font-size:15px;color:var(--text);background:var(--bg);}

/* LAYOUT */
.app{display:flex;height:100vh;height:100dvh;}

/* SIDEBAR */
.sidebar{
  width:var(--sidebar);flex-shrink:0;
  background:var(--bg);
  border-right:0.5px solid var(--border);
  display:flex;flex-direction:column;
  overflow:hidden;
  transition:transform 0.25s ease;
}
.sidebar-header{
  height:var(--header);
  padding:0 14px;
  padding-top:var(--safe-top);
  display:flex;align-items:center;gap:10px;
  border-bottom:0.5px solid var(--border);
  background:var(--bg);
}
.sidebar-header .title{font-size:16px;font-weight:600;flex:1;color:var(--text);}
.sidebar-scroll{flex:1;overflow-y:auto;padding:6px 0;}
.sidebar-footer{padding:10px;border-top:0.5px solid var(--border);}

.folder-row{
  display:flex;align-items:center;gap:8px;
  padding:8px 14px;margin:1px 6px;
  border-radius:var(--radius);cursor:pointer;
  color:var(--text2);font-size:14px;user-select:none;
  transition:background 0.12s;
}
.folder-row:hover{background:var(--bg2);}
.folder-row.active{background:var(--accent-light);color:var(--accent);font-weight:500;}
.folder-row i{font-size:17px;flex-shrink:0;}
.folder-row .fname{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.folder-row .fmeta{font-size:11px;color:var(--text3);}
.folder-row .fdel{display:none;width:20px;height:20px;align-items:center;justify-content:center;border:none;background:transparent;color:var(--text3);cursor:pointer;border-radius:4px;font-size:14px;}
.folder-row:hover .fdel{display:flex;}
.subfolder-row{padding-left:32px;}

.btn-new{
  width:100%;padding:8px;border:0.5px solid var(--border2);
  background:transparent;border-radius:var(--radius);cursor:pointer;
  color:var(--text2);font-size:13px;
  display:flex;align-items:center;justify-content:center;gap:6px;
  transition:background 0.12s;
}
.btn-new:hover{background:var(--bg2);color:var(--text);}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--bg);}
.main-header{
  height:var(--header);
  padding:0 16px;
  padding-top:var(--safe-top);
  display:flex;align-items:center;gap:10px;
  border-bottom:0.5px solid var(--border);
  background:var(--bg);
}
.main-header .path{flex:1;font-size:14px;color:var(--text2);}
.main-header .path strong{color:var(--text);}
.content{flex:1;overflow:auto;}

/* ICON BUTTON */
.ibtn{
  width:32px;height:32px;border:none;background:transparent;
  cursor:pointer;color:var(--text2);border-radius:var(--radius);
  display:flex;align-items:center;justify-content:center;font-size:18px;
  transition:background 0.12s;flex-shrink:0;
}
.ibtn:hover{background:var(--bg2);color:var(--text);}

/* NOTEBOOKS GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(145px,1fr));
  gap:14px;padding:18px;
}
.nb-card{
  background:var(--bg);border:0.5px solid var(--border2);
  border-radius:var(--radius-lg);cursor:pointer;overflow:hidden;
  transition:border-color 0.15s,transform 0.1s;
  position:relative;
  -webkit-tap-highlight-color:transparent;
}
.nb-card:active{transform:scale(0.97);}
.nb-card:hover{border-color:var(--accent);}
.nb-thumb{height:110px;position:relative;display:flex;align-items:center;justify-content:center;}
.nb-thumb canvas{position:absolute;inset:0;width:100%;height:100%;}
.nb-thumb i{position:relative;font-size:32px;z-index:1;}
.nb-info{padding:10px 12px 12px;border-top:0.5px solid var(--border);}
.nb-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.nb-sub{font-size:11px;color:var(--text3);margin-top:2px;}
.nb-del{position:absolute;top:6px;right:6px;display:none;}
.nb-card:hover .nb-del{display:flex;}
.nb-color-bar{height:3px;}

.add-card{
  background:transparent;border:0.5px dashed var(--border2);
  border-radius:var(--radius-lg);cursor:pointer;
  min-height:170px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
  color:var(--text3);font-size:13px;transition:background 0.12s,color 0.12s;
  -webkit-tap-highlight-color:transparent;
}
.add-card:hover{background:var(--bg2);color:var(--text);}

/* EDITOR */
.editor{display:flex;flex-direction:column;height:100%;}
.toolbar{
  background:var(--bg);border-bottom:0.5px solid var(--border);
  padding:6px 10px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;
}
.tsep{width:0.5px;height:22px;background:var(--border2);margin:0 3px;flex-shrink:0;}
.tbtn{
  width:34px;height:34px;border:none;background:transparent;cursor:pointer;
  color:var(--text2);border-radius:var(--radius);
  display:flex;align-items:center;justify-content:center;font-size:18px;
  transition:background 0.12s;-webkit-tap-highlight-color:transparent;
}
.tbtn:hover,.tbtn.on{background:var(--accent-light);color:var(--accent);}
.swatch{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color 0.12s;flex-shrink:0;}
.swatch.sel{border-color:var(--text);}
.sz-label{font-size:12px;color:var(--text3);min-width:22px;text-align:center;}
.back-btn{
  padding:5px 12px;border:0.5px solid var(--border2);background:transparent;
  border-radius:var(--radius);cursor:pointer;color:var(--text2);font-size:13px;
  display:flex;align-items:center;gap:5px;transition:background 0.12s;flex-shrink:0;
}
.back-btn:hover{background:var(--bg2);color:var(--text);}
.page-nav{margin-left:auto;display:flex;align-items:center;gap:5px;font-size:13px;color:var(--text2);}
.page-nav button{border:0.5px solid var(--border2);background:transparent;border-radius:6px;padding:3px 7px;cursor:pointer;color:var(--text2);font-size:13px;}
.page-nav button:hover{background:var(--bg2);}

.canvas-wrap{flex:1;overflow:auto;display:flex;justify-content:center;align-items:flex-start;padding:16px;background:var(--bg3);}
.page{background:white;border:0.5px solid var(--border2);border-radius:4px;position:relative;flex-shrink:0;touch-action:none;}

.export-bar{
  background:var(--bg);border-top:0.5px solid var(--border);
  padding:8px 12px;padding-bottom:calc(8px + var(--safe-bottom));
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;
}
.ebtn{
  padding:7px 14px;border:0.5px solid var(--border2);background:transparent;
  border-radius:var(--radius);cursor:pointer;font-size:13px;color:var(--text2);
  display:flex;align-items:center;gap:6px;transition:background 0.12s;
  -webkit-tap-highlight-color:transparent;
}
.ebtn:hover{background:var(--bg2);color:var(--text);}
.ebtn.primary{background:var(--accent);color:white;border-color:var(--accent);}
.ebtn.primary:hover{opacity:0.88;}
.sync{margin-left:auto;font-size:12px;color:var(--text3);display:flex;align-items:center;gap:5px;}

/* MOBILE: sidebar overlay */
@media(max-width:640px){
  .sidebar{position:fixed;top:0;left:0;height:100%;z-index:50;transform:translateX(-100%);box-shadow:4px 0 20px rgba(0,0,0,0.12);}
  .sidebar.open{transform:translateX(0);}
  .menu-btn{display:flex!important;}
  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:49;}
  .overlay.show{display:block;}
}
.menu-btn{display:none;}

/* MODALS */
.modal-bg{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);
  z-index:200;align-items:center;justify-content:center;padding:20px;
}
.modal-bg.open{display:flex;}
.modal{
  background:var(--bg);border-radius:var(--radius-lg);border:0.5px solid var(--border);
  padding:22px 24px;width:100%;max-width:340px;
}
.modal h3{font-size:16px;font-weight:600;margin-bottom:16px;}
.modal input,.modal select{
  width:100%;padding:9px 11px;
  border:0.5px solid var(--border2);border-radius:var(--radius);
  background:var(--bg2);color:var(--text);font-size:14px;margin-bottom:12px;
  outline:none;
}
.modal input:focus,.modal select:focus{border-color:var(--accent);}
.color-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.c-opt{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color 0.12s;}
.c-opt.sel{border-color:var(--text);}
.ptype-row{display:flex;gap:8px;margin-bottom:16px;}
.ptype{
  flex:1;padding:9px 4px;border:0.5px solid var(--border2);
  border-radius:var(--radius);cursor:pointer;text-align:center;
  font-size:12px;color:var(--text2);transition:background 0.12s;
}
.ptype.sel{border-color:var(--accent);background:var(--accent-light);color:var(--accent);}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;}
.modal-btns button{
  padding:8px 18px;border-radius:var(--radius);cursor:pointer;
  font-size:14px;border:0.5px solid var(--border2);background:transparent;color:var(--text2);
  transition:background 0.12s;
}
.modal-btns .ok{background:var(--accent);color:white;border-color:var(--accent);}

/* EMPTY */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;color:var(--text3);padding:40px;text-align:center;}
.empty i{font-size:52px;}
.empty p{font-size:15px;}
</style>
</head>
<body>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<div class="app">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <i class="ti ti-notebook" style="font-size:20px;color:var(--accent)" aria-hidden="true"></i>
      <span class="title">Mis Notas</span>
      <button class="ibtn" onclick="openFolderModal(null)" title="Nueva carpeta"><i class="ti ti-folder-plus" aria-hidden="true"></i></button>
    </div>
    <div class="sidebar-scroll" id="folderList"></div>
    <div class="sidebar-footer">
      <button class="btn-new" onclick="openFolderModal(null)">
        <i class="ti ti-plus" aria-hidden="true"></i> Nueva carpeta
      </button>
    </div>
  </div>

  <div class="main">
    <div class="main-header" id="mainHeader">
      <button class="ibtn menu-btn" id="menuBtn" onclick="toggleSidebar()"><i class="ti ti-menu-2" aria-hidden="true"></i></button>
      <div class="path" id="mainPath"><strong>Seleccioná una carpeta</strong></div>
    </div>
    <div class="content" id="mainContent"></div>
  </div>
</div>

<!-- Modal: carpeta -->
<div class="modal-bg" id="folderModal">
  <div class="modal">
    <h3>Nueva carpeta</h3>
    <input type="text" id="folderName" placeholder="Nombre de la carpeta">
    <div style="font-size:12px;color:var(--text2);margin-bottom:6px;">Subcarpeta de:</div>
    <select id="parentSel"></select>
    <div class="modal-btns">
      <button onclick="closeFolderModal()">Cancelar</button>
      <button class="ok" onclick="confirmFolder()">Crear</button>
    </div>
  </div>
</div>

<!-- Modal: cuaderno -->
<div class="modal-bg" id="nbModal">
  <div class="modal">
    <h3>Nuevo cuaderno</h3>
    <input type="text" id="nbName" placeholder="Nombre del cuaderno">
    <div style="font-size:12px;color:var(--text2);margin-bottom:8px;">Color:</div>
    <div class="color-row" id="nbColors"></div>
    <div style="font-size:12px;color:var(--text2);margin-bottom:8px;">Tipo de página:</div>
    <div class="ptype-row">
      <div class="ptype sel" data-t="grid" onclick="selPtype(this)"><i class="ti ti-grid-dots" aria-hidden="true"></i><br>Cuadriculada</div>
      <div class="ptype" data-t="lines" onclick="selPtype(this)"><i class="ti ti-align-left" aria-hidden="true"></i><br>Rayada</div>
      <div class="ptype" data-t="blank" onclick="selPtype(this)"><i class="ti ti-file" aria-hidden="true"></i><br>En blanco</div>
    </div>
    <div class="modal-btns">
      <button onclick="closeNbModal()">Cancelar</button>
      <button class="ok" onclick="confirmNb()">Crear</button>
    </div>
  </div>
</div>

<script>
// ── PALETTE ──
const PAL = ['#185FA5','#0F6E56','#993C1D','#993556','#534AB7','#854F0B','#3B6D11'];

// ── STATE ──
let S = loadState();

function loadState() {
  try {
    const saved = localStorage.getItem('notasapp_v2');
    if (saved) return JSON.parse(saved);
  } catch(e){}
  return {
    folders: [
      {id:'f1',name:'Materias',parentId:null,color:'#185FA5'},
      {id:'f2',name:'Apuntes rápidos',parentId:null,color:'#0F6E56'},
    ],
    notebooks: [
      {id:'nb1',folderId:'f1',name:'Mi primer cuaderno',color:'#185FA5',pageType:'grid',pages:1},
    ],
    selectedFolder: 'f1',
    openNb: null,
    currentPage: 0,
    view: 'grid',
    tool: 'pen',
    penColor: '#185FA5',
    penSize: 2,
    newNbColor: PAL[0],
    newNbType: 'grid',
  };
}

// strokes stored separately to keep state lean
let STROKES = {};  // key: nbid_pN → array of stroke arrays
let TEXTS = {};    // key: nbid_pN → array of {x,y,text,color,size}

function saveState() {
  try { localStorage.setItem('notasapp_v2', JSON.stringify(S)); } catch(e){}
}
function saveStrokes() {
  try { localStorage.setItem('notasapp_strokes', JSON.stringify(STROKES)); } catch(e){}
  try { localStorage.setItem('notasapp_texts', JSON.stringify(TEXTS)); } catch(e){}
}
function loadStrokes() {
  try { STROKES = JSON.parse(localStorage.getItem('notasapp_strokes') || '{}'); } catch(e){ STROKES={}; }
  try { TEXTS = JSON.parse(localStorage.getItem('notasapp_texts') || '{}'); } catch(e){ TEXTS={}; }
}

function uid() { return Math.random().toString(36).slice(2,9); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── SIDEBAR TOGGLE (mobile) ──
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

// ── RENDER ──
function render() {
  renderSidebar();
  renderMain();
  saveState();
}

function renderSidebar() {
  const el = document.getElementById('folderList');
  const roots = S.folders.filter(f=>!f.parentId);
  let h = '';
  for (const f of roots) {
    const subs = S.folders.filter(x=>x.parentId===f.id);
    const cnt = S.notebooks.filter(n=>n.folderId===f.id).length;
    const act = S.selectedFolder===f.id;
    h += folderRowHtml(f, cnt, act, false);
    for (const sf of subs) {
      const scnt = S.notebooks.filter(n=>n.folderId===sf.id).length;
      const sact = S.selectedFolder===sf.id;
      h += folderRowHtml(sf, scnt, sact, true);
    }
    h += `<div style="padding-left:36px;padding-bottom:2px;">
      <button class="btn-new" style="font-size:11px;padding:4px 8px;" onclick="openFolderModal('${f.id}')">
        <i class="ti ti-plus" aria-hidden="true"></i> Subcarpeta
      </button></div>`;
  }
  el.innerHTML = h;
}

function folderRowHtml(f, cnt, act, sub) {
  return `<div class="folder-row${act?' active':''}${sub?' subfolder-row':''}" onclick="selFolder('${f.id}')">
    <i class="ti ti-folder${act?'-open':''}" style="color:${f.color||'currentColor'}" aria-hidden="true"></i>
    <span class="fname">${esc(f.name)}</span>
    <span class="fmeta">${cnt}</span>
    <button class="fdel ibtn" onclick="delFolder(event,'${f.id}')" title="Eliminar"><i class="ti ti-x" aria-hidden="true"></i></button>
  </div>`;
}

function renderMain() {
  if (S.view==='grid') renderGrid();
  else renderEditor();
}

function renderGrid() {
  const folder = S.folders.find(f=>f.id===S.selectedFolder);
  const nbs = S.notebooks.filter(n=>n.folderId===S.selectedFolder);
  const parent = folder?.parentId ? S.folders.find(f=>f.id===folder.parentId) : null;
  const pathHtml = folder
    ? `${parent?`<span>${esc(parent.name)} / </span>`:''}` + `<strong>${esc(folder.name)}</strong>`
    : '<strong>Seleccioná una carpeta</strong>';
  document.getElementById('mainPath').innerHTML = pathHtml;

  let h = '';
  if (!folder) {
    h = `<div class="empty"><i class="ti ti-folder-off"></i><p>Seleccioná una carpeta en el menú</p></div>`;
  } else {
    h = `<div class="grid">`;
    for (const nb of nbs) {
      const pages = nb.pages||1;
      const typeLabel = nb.pageType==='grid'?'Cuadriculada':nb.pageType==='lines'?'Rayada':'En blanco';
      h += `<div class="nb-card" onclick="openNb('${nb.id}')">
        <div class="nb-color-bar" style="background:${nb.color}"></div>
        <div class="nb-thumb" style="background:#fafafa;">
          ${thumbSVG(nb.pageType, nb.color)}
          <i class="ti ti-notebook" style="font-size:30px;color:${nb.color};position:relative;z-index:1;" aria-hidden="true"></i>
          <button class="ibtn nb-del" onclick="delNb(event,'${nb.id}')" title="Eliminar"><i class="ti ti-trash" aria-hidden="true"></i></button>
        </div>
        <div class="nb-info">
          <div class="nb-name">${esc(nb.name)}</div>
          <div class="nb-sub">${pages} pág · ${typeLabel}</div>
        </div>
      </div>`;
    }
    h += `<div class="add-card" onclick="openNbModal()">
      <i class="ti ti-plus" style="font-size:26px;" aria-hidden="true"></i>
      <span>Nuevo cuaderno</span>
    </div></div>`;
  }
  document.getElementById('mainContent').innerHTML = h;
}

function thumbSVG(type, color) {
  if (type==='grid') {
    let lines='';
    for(let x=0;x<=145;x+=20) lines+=`<line x1="${x}" y1="0" x2="${x}" y2="110" stroke="${color}" stroke-width="0.6" opacity="0.2"/>`;
    for(let y=0;y<=110;y+=20) lines+=`<line x1="0" y1="${y}" x2="145" y2="${y}" stroke="${color}" stroke-width="0.6" opacity="0.2"/>`;
    return `<svg style="position:absolute;inset:0;width:100%;height:100%;" viewBox="0 0 145 110" xmlns="http://www.w3.org/2000/svg">${lines}</svg>`;
  }
  if (type==='lines') {
    let lines='';
    for(let y=16;y<110;y+=14) lines+=`<line x1="10" y1="${y}" x2="135" y2="${y}" stroke="${color}" stroke-width="0.7" opacity="0.25"/>`;
    return `<svg style="position:absolute;inset:0;width:100%;height:100%;" viewBox="0 0 145 110" xmlns="http://www.w3.org/2000/svg">${lines}</svg>`;
  }
  return '';
}

// ── EDITOR ──
let drawing=false, lastPt=null, curStroke=[];

function renderEditor() {
  const nb = S.notebooks.find(n=>n.id===S.openNb);
  if (!nb) { S.view='grid'; renderMain(); return; }
  const pages = nb.pages||1;
  const cp = Math.min(S.currentPage, pages-1);
  document.getElementById('mainPath').innerHTML = `<strong>${esc(nb.name)}</strong>`;

  const colors = ['#185FA5','#0F6E56','#993C1D','#1c1c1e','#A32D2D','#854F0B','#534AB7','#ffffff'];
  const swatches = colors.map(c=>`<div class="swatch${S.penColor===c?' sel':''}" style="background:${c};${c==='#ffffff'?'border:1px solid var(--border2);':''}" onclick="setPenColor('${c}')" title="${c}"></div>`).join('');

  document.getElementById('mainContent').innerHTML = `<div class="editor" style="height:calc(100vh - var(--header));height:calc(100dvh - var(--header));">
    <div class="toolbar">
      <button class="back-btn" onclick="closeEditor()"><i class="ti ti-arrow-left" aria-hidden="true"></i> Volver</button>
      <div class="tsep"></div>
      <button class="tbtn${S.tool==='pen'?' on':''}" onclick="setTool('pen')" title="Lapicera"><i class="ti ti-pencil" aria-hidden="true"></i></button>
      <button class="tbtn${S.tool==='marker'?' on':''}" onclick="setTool('marker')" title="Marcador"><i class="ti ti-highlight" aria-hidden="true"></i></button>
      <button class="tbtn${S.tool==='eraser'?' on':''}" onclick="setTool('eraser')" title="Borrador"><i class="ti ti-eraser" aria-hidden="true"></i></button>
      <button class="tbtn${S.tool==='text'?' on':''}" onclick="setTool('text')" title="Texto"><i class="ti ti-cursor-text" aria-hidden="true"></i></button>
      <div class="tsep"></div>
      ${swatches}
      <div class="tsep"></div>
      <input type="range" min="1" max="18" value="${S.penSize}" oninput="setPenSize(+this.value)" style="width:56px;accent-color:var(--accent);">
      <span class="sz-label">${S.penSize}</span>
      <div class="tsep"></div>
      <button class="tbtn" onclick="undoStroke()" title="Deshacer"><i class="ti ti-arrow-back-up" aria-hidden="true"></i></button>
      <button class="tbtn" onclick="clearPage()" title="Limpiar"><i class="ti ti-trash" aria-hidden="true"></i></button>
      <div class="page-nav">
        <button onclick="prevPage()"><i class="ti ti-chevron-left" aria-hidden="true"></i></button>
        <span>${cp+1}/${pages}</span>
        <button onclick="nextPage()"><i class="ti ti-chevron-right" aria-hidden="true"></i></button>
        <button class="ibtn" onclick="addPage()" title="Nueva página"><i class="ti ti-file-plus" aria-hidden="true"></i></button>
      </div>
    </div>
    <div class="canvas-wrap" id="canvasWrap">
      <canvas id="noteCanvas" class="page"></canvas>
    </div>
    <div class="export-bar">
      <button class="ebtn" onclick="exportPNG()"><i class="ti ti-photo" aria-hidden="true"></i> PNG</button>
      <button class="ebtn primary" onclick="exportPDF()"><i class="ti ti-file-type-pdf" aria-hidden="true"></i> Exportar PDF</button>
      <div class="sync"><i class="ti ti-cloud-check" aria-hidden="true"></i> Guardado</div>
    </div>
  </div>`;

  setupCanvas(nb, cp);
}

function setupCanvas(nb, pageIndex) {
  const wrap = document.getElementById('canvasWrap');
  const canvas = document.getElementById('noteCanvas');
  if (!canvas) return;

  // Size: A4-ish proportions, responsive
  const maxW = Math.min(wrap.clientWidth - 32, 750);
  const W = maxW;
  const H = Math.round(W * 1.414); // A4 ratio

  canvas.width = W;
  canvas.height = H;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';

  const ctx = canvas.getContext('2d');
  ctx.fillStyle = 'white';
  ctx.fillRect(0,0,W,H);
  drawBg(ctx, nb.pageType, W, H);

  const key = `${nb.id}_p${pageIndex}`;
  if (STROKES[key]) replayStrokes(ctx, STROKES[key], W, H, nb.pageType);
  if (TEXTS[key]) { for (const t of TEXTS[key]) drawText(ctx, t); }

  canvas.addEventListener('pointerdown', onDown);
  canvas.addEventListener('pointermove', onMove);
  canvas.addEventListener('pointerup', onUp);
  canvas.addEventListener('pointercancel', onUp);
  canvas.addEventListener('click', onTextClick);
}

function drawBg(ctx, type, W, H) {
  ctx.save();
  if (type==='grid') {
    const step=Math.round(W/35);
    ctx.strokeStyle='rgba(100,120,210,0.15)';ctx.lineWidth=0.5;
    for(let x=0;x<=W;x+=step){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
    for(let y=0;y<=H;y+=step){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  } else if (type==='lines') {
    const step=Math.round(H/32);
    ctx.strokeStyle='rgba(100,120,210,0.18)';ctx.lineWidth=0.7;
    for(let y=step;y<H;y+=step){ctx.beginPath();ctx.moveTo(Math.round(W*0.08),y);ctx.lineTo(W-10,y);ctx.stroke();}
    ctx.strokeStyle='rgba(200,80,80,0.18)';ctx.lineWidth=1;
    const lx=Math.round(W*0.12);
    ctx.beginPath();ctx.moveTo(lx,0);ctx.lineTo(lx,H);ctx.stroke();
  }
  ctx.restore();
}

function replayStrokes(ctx, strokes, W, H, type) {
  drawBg(ctx, type, W, H);
  for (const s of strokes) {
    if (!s||!s.length) continue;
    applyStyle(ctx, s[0]);
    ctx.beginPath();
    ctx.moveTo(s[0].x, s[0].y);
    for (let i=1;i<s.length;i++) ctx.lineTo(s[i].x, s[i].y);
    ctx.stroke();
  }
  ctx.globalCompositeOperation='source-over';
}

function applyStyle(ctx, f) {
  if (f.tool==='eraser') {
    ctx.globalCompositeOperation='destination-out';
    ctx.strokeStyle='rgba(0,0,0,1)';
    ctx.lineWidth=f.size*5;
  } else if (f.tool==='marker') {
    ctx.globalCompositeOperation='source-over';
    ctx.strokeStyle=f.color+'60';
    ctx.lineWidth=f.size*3;
  } else {
    ctx.globalCompositeOperation='source-over';
    ctx.strokeStyle=f.color;
    ctx.lineWidth=f.size;
  }
  ctx.lineCap='round';ctx.lineJoin='round';
}

function drawText(ctx, t) {
  ctx.globalCompositeOperation='source-over';
  ctx.font=`${t.size||16}px -apple-system,sans-serif`;
  ctx.fillStyle=t.color;
  ctx.fillText(t.text, t.x, t.y);
}

function getXY(e) {
  const c=e.target, r=c.getBoundingClientRect();
  const sx=c.width/r.width, sy=c.height/r.height;
  return {x:(e.clientX-r.left)*sx, y:(e.clientY-r.top)*sy};
}

function onDown(e) {
  if (S.tool==='text') return;
  drawing=true; curStroke=[];
  const p=getXY(e);
  lastPt=p;
  const first={...p, tool:S.tool, color:S.penColor, size:S.penSize};
  curStroke.push(first);
  const ctx=e.target.getContext('2d');
  applyStyle(ctx,first);
  ctx.beginPath();ctx.moveTo(p.x,p.y);
  e.target.setPointerCapture(e.pointerId);
  e.preventDefault();
}
function onMove(e) {
  if (!drawing) return;
  const p=getXY(e);
  const ctx=e.target.getContext('2d');
  ctx.lineTo(p.x,p.y);ctx.stroke();
  curStroke.push({x:p.x,y:p.y});
  lastPt=p;
  e.preventDefault();
}
function onUp(e) {
  if (!drawing) return;
  drawing=false;
  if (curStroke.length<2) return;
  const nb=S.notebooks.find(n=>n.id===S.openNb);
  const key=`${nb.id}_p${S.currentPage}`;
  if (!STROKES[key]) STROKES[key]=[];
  STROKES[key].push([...curStroke]);
  curStroke=[];
  saveStrokes();
}

function onTextClick(e) {
  if (S.tool!=='text') return;
  const p=getXY(e);
  const text=prompt('Escribí el texto:');
  if (!text) return;
  const nb=S.notebooks.find(n=>n.id===S.openNb);
  const key=`${nb.id}_p${S.currentPage}`;
  if (!TEXTS[key]) TEXTS[key]=[];
  const t={x:p.x, y:p.y, text, color:S.penColor, size:S.penSize+14};
  TEXTS[key].push(t);
  const ctx=e.target.getContext('2d');
  drawText(ctx,t);
  saveStrokes();
}

function undoStroke() {
  const nb=S.notebooks.find(n=>n.id===S.openNb);
  const key=`${nb.id}_p${S.currentPage}`;
  if (STROKES[key]&&STROKES[key].length) {
    STROKES[key].pop();
    saveStrokes();
    redrawCanvas(nb,S.currentPage);
  }
}

function clearPage() {
  if (!confirm('¿Limpiar esta página?')) return;
  const nb=S.notebooks.find(n=>n.id===S.openNb);
  const key=`${nb.id}_p${S.currentPage}`;
  STROKES[key]=[]; TEXTS[key]=[];
  saveStrokes();
  redrawCanvas(nb,S.currentPage);
}

function redrawCanvas(nb,pageIndex) {
  const canvas=document.getElementById('noteCanvas');
  if (!canvas) return;
  const ctx=canvas.getContext('2d');
  ctx.globalCompositeOperation='source-over';
  ctx.fillStyle='white';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  replayStrokes(ctx, STROKES[`${nb.id}_p${pageIndex}`]||[], canvas.width, canvas.height, nb.pageType);
  if (TEXTS[`${nb.id}_p${pageIndex}`]) {
    for (const t of TEXTS[`${nb.id}_p${pageIndex}`]) drawText(ctx,t);
  }
}

function setTool(t) { S.tool=t; saveState(); renderEditor(); }
function setPenColor(c) { S.penColor=c; saveState(); renderEditor(); }
function setPenSize(v) { S.penSize=v; document.querySelector('.sz-label').textContent=v; }

function addPage() {
  const nb=S.notebooks.find(n=>n.id===S.openNb);
  nb.pages=(nb.pages||1)+1;
  S.currentPage=nb.pages-1;
  saveState();renderEditor();
}
function prevPage() {
  if (S.currentPage>0){S.currentPage--;saveState();renderEditor();}
}
function nextPage() {
  const nb=S.notebooks.find(n=>n.id===S.openNb);
  if (S.currentPage<(nb.pages||1)-1){S.currentPage++;saveState();renderEditor();}
}

function exportPNG() {
  const canvas=document.getElementById('noteCanvas');
  if (!canvas) return;
  const nb=S.notebooks.find(n=>n.id===S.openNb);
  const a=document.createElement('a');
  a.download=`${nb.name}-pagina${S.currentPage+1}.png`;
  a.href=canvas.toDataURL('image/png');
  a.click();
}

function exportPDF() {
  const canvas=document.getElementById('noteCanvas');
  if (!canvas){alert('Abrí un cuaderno primero');return;}
  const nb=S.notebooks.find(n=>n.id===S.openNb);
  const scr=document.createElement('script');
  scr.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
  scr.onload=function(){
    const {jsPDF}=window.jspdf;
    const W=canvas.width,H=canvas.height;
    const doc=new jsPDF({orientation:H>W?'portrait':'landscape',unit:'px',format:[W,H]});
    const img=canvas.toDataURL('image/png');
    doc.addImage(img,'PNG',0,0,W,H);
    doc.save(`${nb.name}.pdf`);
  };
  document.head.appendChild(scr);
}

function openNb(id) {
  S.openNb=id; S.currentPage=0; S.view='editor'; S.tool='pen';
  closeSidebar(); saveState(); renderMain();
}
function closeEditor() {
  S.view='grid'; S.openNb=null; saveState(); renderMain();
}
function selFolder(id) {
  S.selectedFolder=id; S.view='grid'; S.openNb=null;
  closeSidebar(); saveState(); render();
}
function delFolder(e,id) {
  e.stopPropagation();
  if (!confirm('¿Eliminar carpeta y sus cuadernos?')) return;
  S.folders=S.folders.filter(f=>f.id!==id&&f.parentId!==id);
  S.notebooks=S.notebooks.filter(n=>n.folderId!==id);
  if (S.selectedFolder===id) S.selectedFolder=S.folders[0]?.id||null;
  saveState();render();
}
function delNb(e,id) {
  e.stopPropagation();
  if (!confirm('¿Eliminar cuaderno?')) return;
  S.notebooks=S.notebooks.filter(n=>n.id!==id);
  saveState();render();
}

// ── FOLDER MODAL ──
function openFolderModal(parentId) {
  const sel=document.getElementById('parentSel');
  sel.innerHTML='<option value="">— Raíz —</option>';
  S.folders.filter(f=>!f.parentId).forEach(f=>{
    const o=document.createElement('option');
    o.value=f.id; o.textContent=f.name;
    if (parentId===f.id) o.selected=true;
    sel.appendChild(o);
  });
  document.getElementById('folderName').value='';
  document.getElementById('folderModal').classList.add('open');
  setTimeout(()=>document.getElementById('folderName').focus(),80);
}
function closeFolderModal(){document.getElementById('folderModal').classList.remove('open');}
function confirmFolder(){
  const name=document.getElementById('folderName').value.trim();
  if (!name) return;
  const parentId=document.getElementById('parentSel').value||null;
  const colors=PAL;
  S.folders.push({id:uid(),name,parentId,color:colors[S.folders.length%colors.length]});
  closeFolderModal();render();
}

// ── NB MODAL ──
function openNbModal(){
  if (!S.selectedFolder){alert('Primero seleccioná una carpeta');return;}
  S.newNbColor=PAL[0]; S.newNbType='grid';
  document.getElementById('nbName').value='';
  document.getElementById('nbColors').innerHTML=PAL.map((c,i)=>
    `<div class="c-opt${i===0?' sel':''}" style="background:${c}" onclick="selNbColor(this,'${c}')"></div>`
  ).join('');
  document.querySelectorAll('.ptype').forEach(el=>el.classList.toggle('sel',el.dataset.t==='grid'));
  document.getElementById('nbModal').classList.add('open');
  setTimeout(()=>document.getElementById('nbName').focus(),80);
}
function closeNbModal(){document.getElementById('nbModal').classList.remove('open');}
function selNbColor(el,c){
  S.newNbColor=c;
  document.querySelectorAll('.c-opt').forEach(e=>e.classList.remove('sel'));
  el.classList.add('sel');
}
function selPtype(el){
  S.newNbType=el.dataset.t;
  document.querySelectorAll('.ptype').forEach(e=>e.classList.remove('sel'));
  el.classList.add('sel');
}
function confirmNb(){
  const name=document.getElementById('nbName').value.trim();
  if (!name) return;
  S.notebooks.push({id:uid(),folderId:S.selectedFolder,name,color:S.newNbColor,pageType:S.newNbType,pages:1});
  closeNbModal();saveState();render();
}

// ── INIT ──
loadStrokes();
render();

// Register service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
</body>
